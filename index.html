<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的日記</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f4ef; --bg2: #eee9e0; --ink: #1a1710; --ink2: #5a5448; --ink3: #9a9080;
      --accent: #c0392b; --accent2: #e8c547; --card: #ffffff; --border: #ddd8ce;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Serif TC', serif; min-height: 100vh; }

    /* AUTH */
    #auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ink); position:relative; overflow:hidden; }
    #auth-screen::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 41px); }
    .auth-box { position:relative; z-index:1; text-align:center; padding:48px 40px; max-width:360px; width:90%; }
    .auth-box h1 { font-size:42px; color:#f7f4ef; letter-spacing:-0.02em; margin-bottom:8px; }
    .auth-box p { color:#5a5448; font-size:14px; margin-bottom:40px; font-family:'DM Mono',monospace; }
    .auth-year { font-family:'DM Mono',monospace; font-size:11px; color:#3a342a; letter-spacing:0.2em; margin-bottom:16px; }
    .btn-google { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:14px 20px; background:var(--accent); color:white; border:none; border-radius:4px; font-size:15px; font-family:'Noto Serif TC',serif; cursor:pointer; transition:all 0.2s; letter-spacing:0.02em; }
    .btn-google:hover { background:#a93226; transform:translateY(-1px); }

    /* APP */
    #app { display:none; min-height:100vh; padding-bottom:64px; }
    header { background:var(--ink); color:#f7f4ef; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
    .header-title { font-size:18px; letter-spacing:0.05em; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .avatar { width:32px; height:32px; border-radius:50%; border:2px solid #3a342a; cursor:pointer; }
    .btn-signout { font-family:'DM Mono',monospace; font-size:11px; color:#5a5448; background:none; border:1px solid #3a342a; padding:4px 10px; border-radius:3px; cursor:pointer; letter-spacing:0.1em; }
    .btn-signout:hover { color:#f7f4ef; border-color:#5a5448; }

    /* BOTTOM NAV */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:56px; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:150; }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; color:var(--ink3); transition:color 0.2s; }
    .nav-btn.active { color:var(--accent); }
    .nav-btn span:first-child { font-size:20px; }

    /* PAGES */
    .page { display:none; }
    .page.active { display:block; }
    .container { max-width:720px; margin:0 auto; padding:24px 16px 16px; }

    /* FAB */
    .fab { position:fixed; bottom:72px; right:20px; width:52px; height:52px; background:var(--accent); color:white; border:none; border-radius:50%; font-size:26px; cursor:pointer; box-shadow:0 4px 20px rgba(192,57,43,0.4); transition:all 0.2s; z-index:200; display:flex; align-items:center; justify-content:center; }
    .fab:hover { transform:scale(1.1); }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,8,5,0.7); z-index:300; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card); width:100%; max-width:720px; max-height:92vh; border-radius:16px 16px 0 0; overflow-y:auto; padding:28px 24px 40px; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .modal-title { font-size:18px; font-weight:700; }
    .btn-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink3); line-height:1; }

    /* FORM */
    .form-group { margin-bottom:18px; }
    label { display:block; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--ink3); margin-bottom:6px; text-transform:uppercase; }
    input[type="text"], input[type="date"], textarea { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:6px; font-family:'Noto Serif TC',serif; font-size:15px; background:var(--bg); color:var(--ink); outline:none; transition:border-color 0.2s; }
    input:focus, textarea:focus { border-color:var(--accent); }
    textarea { min-height:160px; resize:vertical; line-height:1.7; }
    .mood-row { display:flex; gap:8px; flex-wrap:wrap; }
    .mood-btn { font-size:22px; background:var(--bg2); border:2px solid transparent; border-radius:8px; padding:6px 10px; cursor:pointer; transition:all 0.15s; }
    .mood-btn.selected { border-color:var(--accent); background:#fff0ee; }
    .tag-input-row { display:flex; gap:8px; }
    .tag-input-row input { flex:1; }
    .btn-add-tag { padding:12px 16px; background:var(--ink); color:#f7f4ef; border:none; border-radius:6px; cursor:pointer; font-size:18px; }
    .tags-preview { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .tag-chip { font-family:'DM Mono',monospace; font-size:11px; padding:3px 10px; background:var(--bg2); border-radius:20px; display:flex; align-items:center; gap:4px; cursor:pointer; }
    .tag-chip:hover { background:#fde8e8; }

    /* PHOTO UPLOAD BUTTON */
    .photo-upload-area {
      position:relative; border:2px dashed var(--border); border-radius:12px;
      padding:24px; text-align:center; cursor:pointer; transition:all 0.2s;
      background:var(--bg);
    }
    .photo-upload-area:hover { border-color:var(--accent); background:#fff8f8; }
    .photo-upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .photo-upload-icon { font-size:32px; margin-bottom:8px; }
    .photo-upload-text { font-size:14px; color:var(--ink2); }
    .photo-upload-sub { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); margin-top:4px; }
    .photo-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .photo-preview-item { position:relative; }
    .photo-preview-item img { width:80px; height:80px; object-fit:cover; border-radius:8px; border:2px solid var(--border); display:block; }
    .photo-preview-remove { position:absolute; top:-6px; right:-6px; width:20px; height:20px; background:var(--accent); color:white; border:none; border-radius:50%; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }

    .privacy-row { display:flex; align-items:center; gap:10px; }
    .toggle { position:relative; width:44px; height:24px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:24px; cursor:pointer; transition:0.2s; }
    .toggle-slider::before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.2s; }
    .toggle input:checked + .toggle-slider { background:var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(20px); }
    .btn-save { width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:8px; font-size:16px; font-family:'Noto Serif TC',serif; cursor:pointer; margin-top:8px; letter-spacing:0.05em; transition:all 0.2s; }
    .btn-save:hover { background:#a93226; }
    .btn-save:disabled { opacity:0.5; cursor:not-allowed; }

    /* FILTER */
    .filter-bar { display:flex; gap:8px; margin-bottom:20px; }
    .filter-bar input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-family:'Noto Serif TC',serif; background:var(--card); font-size:14px; outline:none; }
    .filter-bar input:focus { border-color:var(--accent); }

    /* ENTRY CARDS */
    .entries-list { display:flex; flex-direction:column; gap:16px; }
    .entry-card { background:var(--card); border-radius:10px; padding:20px; box-shadow:var(--shadow); border-left:3px solid transparent; transition:all 0.2s; animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .entry-card:hover { border-left-color:var(--accent); transform:translateX(3px); }
    .entry-card.private { border-left-color:var(--accent2); }
    .entry-meta { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .entry-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); letter-spacing:0.1em; }
    .entry-mood { font-size:16px; }
    .entry-private-badge { font-family:'DM Mono',monospace; font-size:10px; padding:2px 7px; background:#fff8e1; color:#b7860b; border-radius:10px; border:1px solid #e8c547; }
    .entry-title { font-size:17px; font-weight:700; margin-bottom:6px; }
    .entry-body { font-size:14px; color:var(--ink2); line-height:1.7; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .entry-footer { margin-top:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .entry-location { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); }
    .entry-tags { display:flex; gap:5px; flex-wrap:wrap; }
    .entry-tag { font-family:'DM Mono',monospace; font-size:10px; padding:2px 8px; background:var(--bg2); border-radius:10px; color:var(--ink2); }
    .entry-photos { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
    .entry-photos img { width:64px; height:64px; object-fit:cover; border-radius:6px; }
    .entry-delete { margin-left:auto; background:none; border:none; color:var(--ink3); font-size:16px; cursor:pointer; padding:4px; opacity:0; transition:opacity 0.2s; }
    .entry-card:hover .entry-delete { opacity:1; }
    .entry-delete:hover { color:var(--accent); }
    .empty { text-align:center; padding:64px 24px; color:var(--ink3); }
    .empty-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
    .empty p { font-size:14px; font-family:'DM Mono',monospace; }
    .loading { text-align:center; padding:40px; color:var(--ink3); font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.15em; }

    /* OVERVIEW */
    .overview-grid { display:grid; gap:16px; }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .stat-card { background:var(--card); border-radius:10px; padding:16px; box-shadow:var(--shadow); text-align:center; }
    .stat-num { font-size:32px; font-weight:700; color:var(--accent); font-family:'DM Mono',monospace; line-height:1; }
    .stat-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--ink3); letter-spacing:0.1em; margin-top:4px; text-transform:uppercase; }
    .ov-card { background:var(--card); border-radius:10px; padding:20px; box-shadow:var(--shadow); }
    .ov-title { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--ink3); text-transform:uppercase; margin-bottom:16px; }
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .cal-nav-btn { background:none; border:1px solid var(--border); border-radius:4px; padding:4px 10px; cursor:pointer; font-size:14px; color:var(--ink2); }
    .cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
    .cal-month-label { font-size:15px; font-weight:700; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-dow { text-align:center; font-family:'DM Mono',monospace; font-size:10px; color:var(--ink3); padding:4px 0; }
    .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:12px; font-family:'DM Mono',monospace; color:var(--ink2); }
    .cal-day.has-entry { background:#fff0ee; color:var(--accent); font-weight:700; cursor:pointer; }
    .cal-day.has-entry:hover { background:var(--accent); color:white; }
    .cal-day.today { outline:2px solid var(--accent2); outline-offset:-2px; }
    .cal-day.other-month { color:var(--border); }
    .mood-chart { display:flex; gap:8px; align-items:flex-end; height:80px; }
    .mood-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
    .mood-bar { width:100%; background:var(--accent); border-radius:4px 4px 0 0; min-height:4px; transition:height 0.4s; }
    .mood-bar-emoji { font-size:14px; }
    .mood-bar-count { font-family:'DM Mono',monospace; font-size:9px; color:var(--ink3); }
    .tag-cloud { display:flex; gap:8px; flex-wrap:wrap; }
    .cloud-tag { font-family:'DM Mono',monospace; padding:5px 12px; background:var(--bg2); border-radius:20px; color:var(--ink2); cursor:pointer; transition:all 0.15s; border:1px solid transparent; }
    .cloud-tag:hover { background:#fff0ee; border-color:var(--accent); color:var(--accent); }
    .loc-list { display:flex; flex-direction:column; gap:8px; }
    .loc-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--bg); border-radius:8px; font-size:14px; cursor:pointer; transition:background 0.15s; }
    .loc-item:hover { background:#fff0ee; }
    .loc-count { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); }
    .no-data { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); }

    /* PHOTO GALLERY PAGE */
    .gallery-layout { display:flex; gap:0; min-height:calc(100vh - 120px); }

    /* Timeline sidebar */
    .timeline-bar {
      width:56px; flex-shrink:0;
      position:sticky; top:56px; align-self:flex-start;
      height:calc(100vh - 120px); overflow-y:auto;
      display:flex; flex-direction:column; align-items:center;
      padding:12px 0; gap:0;
      scrollbar-width:none;
    }
    .timeline-bar::-webkit-scrollbar { display:none; }
    .timeline-line { position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--border); transform:translateX(-50%); z-index:0; }
    .timeline-month {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      cursor:pointer; padding:6px 4px; transition:all 0.2s;
      border-radius:8px; width:100%; text-align:center;
    }
    .timeline-month:hover { background:var(--bg2); }
    .timeline-month.active { background:#fff0ee; }
    .timeline-dot {
      width:10px; height:10px; border-radius:50%;
      background:var(--border); border:2px solid var(--card);
      transition:all 0.2s; flex-shrink:0; margin-bottom:3px;
    }
    .timeline-month.active .timeline-dot { background:var(--accent); border-color:var(--accent); transform:scale(1.3); }
    .timeline-month:hover .timeline-dot { background:var(--ink3); }
    .timeline-label {
      font-family:'DM Mono',monospace; font-size:9px;
      color:var(--ink3); letter-spacing:0.02em; line-height:1.3;
      white-space:normal; text-align:center; word-break:keep-all;
    }
    .timeline-month.active .timeline-label { color:var(--accent); font-weight:700; }
    .timeline-count { font-family:'DM Mono',monospace; font-size:8px; color:var(--ink3); }

    /* Photo grid */
    .gallery-content { flex:1; min-width:0; padding:0 0 0 8px; }
    .gallery-month-section { margin-bottom:20px; }
    .gallery-month-header {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.15em;
      color:var(--ink3); text-transform:uppercase; margin-bottom:8px;
      padding:4px 0; border-bottom:1px solid var(--border);
      position:sticky; top:56px; background:var(--bg); z-index:10;
    }
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
    @media(min-width:480px){ .photo-grid { grid-template-columns:repeat(4,1fr); gap:5px; } }
    .photo-grid-item { position:relative; aspect-ratio:1; overflow:hidden; border-radius:6px; cursor:pointer; background:var(--bg2); }
    .photo-grid-item img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
    .photo-grid-item:hover img { transform:scale(1.08); }
    .photo-grid-item .photo-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%); opacity:0; transition:opacity 0.2s; display:flex; align-items:flex-end; padding:6px; }
    .photo-grid-item:hover .photo-overlay { opacity:1; }
    .photo-overlay-date { font-family:'DM Mono',monospace; font-size:10px; color:white; letter-spacing:0.05em; }

    /* Date tooltip bubble */
    .photo-grid-item::after {
      content:attr(data-date);
      position:absolute; bottom:calc(100% + 6px); left:50%;
      transform:translateX(-50%) scale(0.8);
      background:var(--ink); color:white;
      font-family:'DM Mono',monospace; font-size:10px;
      padding:4px 8px; border-radius:6px; white-space:nowrap;
      opacity:0; pointer-events:none; transition:all 0.15s;
      z-index:20;
    }
    .photo-grid-item:hover::after {
      opacity:1; transform:translateX(-50%) scale(1);
    }

    /* LIGHTBOX */
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; align-items:center; justify-content:center; flex-direction:column; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:65vh; object-fit:contain; border-radius:8px; }
    .lightbox-info { margin-top:16px; text-align:center; color:white; }
    .lightbox-title { font-size:16px; font-weight:700; margin-bottom:4px; }
    .lightbox-meta { font-family:'DM Mono',monospace; font-size:11px; color:#999; }
    .lightbox-close { position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:28px; cursor:pointer; }
    .lightbox-btn { margin-top:16px; padding:10px 24px; background:var(--accent); color:white; border:none; border-radius:6px; font-family:'Noto Serif TC',serif; font-size:14px; cursor:pointer; }
    .lightbox-btn:hover { background:#a93226; }

    /* TOAST */
    .toast { position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#f7f4ef; padding:12px 24px; border-radius:24px; font-family:'DM Mono',monospace; font-size:13px; opacity:0; transition:all 0.3s; z-index:600; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media(max-width:480px){ .modal{padding:20px 16px 32px} .stat-num{font-size:24px} }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-year">✦ JOURNAL ✦</div>
    <h1>我的日記</h1>
    <p>記錄每一個值得留下的瞬間</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#fff" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#fff" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#fff" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <span class="header-title" id="page-title">✦ 我的日記</span>
    <div class="header-right">
      <img id="user-avatar" class="avatar" src="" alt="" style="display:none"/>
      <button class="btn-signout" onclick="signOut()">登出</button>
    </div>
  </header>

  <!-- PAGE: JOURNAL -->
  <div id="page-journal" class="page active">
    <div class="container">
      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="搜尋內容、標籤、地點…" oninput="filterEntries()"/>
      </div>
      <div id="entries-container" class="entries-list">
        <div class="loading">loading…</div>
      </div>
    </div>
  </div>

  <!-- PAGE: OVERVIEW -->
  <div id="page-overview" class="page">
    <div class="container">
      <div class="overview-grid">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">總篇數</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-streak">—</div><div class="stat-label">連續天</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-locs">—</div><div class="stat-label">地點數</div></div>
        </div>
        <div class="ov-card">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">◀</button>
            <span class="cal-month-label" id="cal-label"></span>
            <button class="cal-nav-btn" onclick="calNext()">▶</button>
          </div>
          <div class="cal-grid">
            <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
            <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
          </div>
          <div class="cal-grid" id="cal-days"></div>
        </div>
        <div class="ov-card"><div class="ov-title">心情分佈</div><div class="mood-chart" id="mood-chart"></div></div>
        <div class="ov-card"><div class="ov-title">標籤雲</div><div class="tag-cloud" id="tag-cloud"></div></div>
        <div class="ov-card"><div class="ov-title">去過的地方</div><div class="loc-list" id="loc-list"></div></div>
      </div>
    </div>
  </div>

  <!-- PAGE: PHOTOS -->
  <div id="page-photos" class="page">
    <div class="container" style="padding-top:16px">
      <div class="gallery-layout">
        <div class="timeline-bar" id="timeline-bar">
          <div class="timeline-line"></div>
        </div>
        <div class="gallery-content" id="gallery-content">
          <div class="loading">loading…</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-journal" onclick="switchPage('journal')"><span>📖</span><span>日記</span></button>
    <button class="nav-btn" id="nav-overview" onclick="switchPage('overview')"><span>📊</span><span>總覽</span></button>
    <button class="nav-btn" id="nav-photos" onclick="switchPage('photos')"><span>🖼️</span><span>照片</span></button>
  </nav>

  <button class="fab" onclick="openModal()">＋</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt=""/>
  <div class="lightbox-info">
    <div class="lightbox-title" id="lightbox-title"></div>
    <div class="lightbox-meta" id="lightbox-meta"></div>
  </div>
  <button class="lightbox-btn" id="lightbox-goto" onclick="gotoEntry()">查看當天日記 →</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新增日記</span>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group"><label>日期</label><input type="date" id="entry-date"/></div>
    <div class="form-group"><label>標題</label><input type="text" id="entry-title" placeholder="今天的主題…"/></div>
    <div class="form-group"><label>內容</label><textarea id="entry-content" placeholder="寫下今天的故事…"></textarea></div>
    <div class="form-group">
      <label>心情</label>
      <div class="mood-row">
        <button class="mood-btn" data-mood="😊" onclick="selectMood(this)">😊</button>
        <button class="mood-btn" data-mood="😢" onclick="selectMood(this)">😢</button>
        <button class="mood-btn" data-mood="😡" onclick="selectMood(this)">😡</button>
        <button class="mood-btn" data-mood="😴" onclick="selectMood(this)">😴</button>
        <button class="mood-btn" data-mood="🥰" onclick="selectMood(this)">🥰</button>
        <button class="mood-btn" data-mood="😰" onclick="selectMood(this)">😰</button>
        <button class="mood-btn" data-mood="🤩" onclick="selectMood(this)">🤩</button>
        <button class="mood-btn" data-mood="😌" onclick="selectMood(this)">😌</button>
      </div>
    </div>
    <div class="form-group"><label>地點</label><input type="text" id="entry-location" placeholder="今天在哪裡？"/></div>
    <div class="form-group">
      <label>標籤</label>
      <div class="tag-input-row">
        <input type="text" id="tag-input" placeholder="輸入標籤…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}"/>
        <button class="btn-add-tag" onclick="addTag()">＋</button>
      </div>
      <div class="tags-preview" id="tags-preview"></div>
    </div>

    <!-- BEAUTIFUL PHOTO UPLOAD -->
    <div class="form-group">
      <label>照片</label>
      <div class="photo-upload-area" id="upload-area">
        <input type="file" id="photo-input" accept="image/*" multiple onchange="previewPhotos()"/>
        <div class="photo-upload-icon">📷</div>
        <div class="photo-upload-text">點擊或拖曳照片到這裡</div>
        <div class="photo-upload-sub">支援 JPG、PNG、HEIC · 可多選</div>
      </div>
      <div class="photo-preview" id="photo-preview"></div>
    </div>

    <div class="form-group">
      <label>私密日記</label>
      <div class="privacy-row">
        <label class="toggle"><input type="checkbox" id="entry-private"/><span class="toggle-slider"></span></label>
        <span style="font-size:13px;color:var(--ink2)">只有自己看得到</span>
      </div>
    </div>
    <button class="btn-save" id="save-btn" onclick="saveEntry()">儲存日記</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAy3M-n7ZMn7pVxG68orrxWkbpKXaVwHw",
    authDomain: "journal-f1e55.firebaseapp.com",
    projectId: "journal-f1e55",
    storageBucket: "journal-f1e55.firebasestorage.app",
    messagingSenderId: "738988925026",
    appId: "1:738988925026:web:4382e4a262148640a2b13b",
    measurementId: "G-9EEBLB1VD5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null, allEntries = [], currentTags = [], selectedMood = '';
  let calYear, calMonth, lightboxEntryId = null, selectedFiles = [];

  // AUTH
  window.signInWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { showToast('登入失敗：' + e.message); }
  };
  window.signOut = async () => { await fbSignOut(auth); };

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      const av = document.getElementById('user-avatar');
      if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
      const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
      loadEntries();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });

  // PAGE SWITCH
  window.switchPage = (name) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    const titles = { journal:'✦ 我的日記', overview:'✦ 總覽', photos:'✦ 照片牆' };
    document.getElementById('page-title').textContent = titles[name];
    if (name === 'overview') renderOverview();
    if (name === 'photos') renderPhotoGallery();
  };

  // LOAD
  async function loadEntries() {
    const c = document.getElementById('entries-container');
    c.innerHTML = '<div class="loading">loading…</div>';
    try {
      const snap = await getDocs(query(collection(db,'entries'), where('uid','==',currentUser.uid)));
      allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a,b) => (b.date||'').localeCompare(a.date||''));
      renderEntries(allEntries);
    } catch(e) {
      c.innerHTML = '<div class="loading">載入失敗：' + e.message + '</div>';
    }
  }

  function renderEntries(entries) {
    const c = document.getElementById('entries-container');
    if (!entries.length) {
      c.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><p>還沒有日記，點擊 ＋ 開始寫吧</p></div>`;
      return;
    }
    c.innerHTML = entries.map(e => `
      <div class="entry-card ${e.isPrivate?'private':''}">
        <div class="entry-meta">
          <span class="entry-date">${e.date||''}</span>
          ${e.mood?`<span class="entry-mood">${e.mood}</span>`:''}
          ${e.isPrivate?'<span class="entry-private-badge">🔒 私密</span>':''}
          <button class="entry-delete" onclick="deleteEntry(event,'${e.id}')">🗑</button>
        </div>
        <div class="entry-title">${e.title||'(無標題)'}</div>
        <div class="entry-body">${e.content||''}</div>
        ${e.photos&&e.photos.length?`<div class="entry-photos">${e.photos.map(p=>`<img src="${p}" loading="lazy"/>`).join('')}</div>`:''}
        <div class="entry-footer">
          ${e.location?`<span class="entry-location">📍 ${e.location}</span>`:''}
          <div class="entry-tags">${(e.tags||[]).map(t=>`<span class="entry-tag"># ${t}</span>`).join('')}</div>
        </div>
      </div>`).join('');
  }

  window.filterEntries = () => {
    const q = document.getElementById('search-input').value.toLowerCase();
    if (!q) { renderEntries(allEntries); return; }
    renderEntries(allEntries.filter(e =>
      (e.title||'').toLowerCase().includes(q) ||
      (e.content||'').toLowerCase().includes(q) ||
      (e.location||'').toLowerCase().includes(q) ||
      (e.tags||[]).some(t => t.toLowerCase().includes(q))
    ));
  };

  // PHOTO GALLERY with timeline
  function renderPhotoGallery() {
    const content = document.getElementById('gallery-content');
    const timelineBar = document.getElementById('timeline-bar');

    // Collect all photos grouped by month
    const byMonth = {};
    allEntries.forEach(e => {
      (e.photos||[]).forEach(url => {
        const month = (e.date||'').slice(0,7); // "2026-03"
        if (!month) return;
        if (!byMonth[month]) byMonth[month] = [];
        byMonth[month].push({ url, entryId:e.id, title:e.title||'(無標題)', date:e.date||'', mood:e.mood||'' });
      });
    });

    const months = Object.keys(byMonth).sort().reverse();
    const allPhotos = [];
    months.forEach(m => byMonth[m].forEach(p => allPhotos.push(p)));
    window._galleryPhotos = allPhotos;

    if (!months.length) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🖼️</div><p>還沒有照片，寫日記時上傳吧</p></div>`;
      timelineBar.innerHTML = '<div class="timeline-line"></div>';
      return;
    }

    // Render timeline sidebar
    const monthLabels = { '01':'一月','02':'二月','03':'三月','04':'四月','05':'五月','06':'六月','07':'七月','08':'八月','09':'九月','10':'十月','11':'十一','12':'十二' };
    timelineBar.innerHTML = '<div class="timeline-line"></div>' + months.map((m,i) => {
      const [yr, mo] = m.split('-');
      const cnt = byMonth[m].length;
      return `<div class="timeline-month ${i===0?'active':''}" id="tm-${m}" onclick="scrollToMonth('${m}')">
        <div class="timeline-dot"></div>
        <div class="timeline-label">${yr}<br>${monthLabels[mo]||mo}</div>
        <div class="timeline-count">${cnt}</div>
      </div>`;
    }).join('');

    // Render photo sections
    let photoIndex = 0;
    content.innerHTML = months.map(m => {
      const [yr, mo] = m.split('-');
      const label = `${yr} 年 ${monthLabels[mo]||mo}月 · ${byMonth[m].length} 張`;
      const items = byMonth[m].map((p,i) => {
        const idx = photoIndex++;
        return `<div class="photo-grid-item" data-date="${p.date}" data-month="${m}" onclick="openLightbox(${idx})">
          <img src="${p.url}" loading="lazy" alt="${p.title}"/>
          <div class="photo-overlay"><span class="photo-overlay-date">${p.date}</span></div>
        </div>`;
      }).join('');
      return `<div class="gallery-month-section" id="month-${m}">
        <div class="gallery-month-header">${label}</div>
        <div class="photo-grid">${items}</div>
      </div>`;
    }).join('');

    // Observe which month is in view to highlight timeline
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const m = entry.target.id.replace('month-','');
          document.querySelectorAll('.timeline-month').forEach(el => el.classList.remove('active'));
          const tm = document.getElementById('tm-'+m);
          if (tm) { tm.classList.add('active'); tm.scrollIntoView({block:'nearest',behavior:'smooth'}); }
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.gallery-month-section').forEach(el => observer.observe(el));
  }

  window.scrollToMonth = (m) => {
    const el = document.getElementById('month-'+m);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    document.querySelectorAll('.timeline-month').forEach(el => el.classList.remove('active'));
    const tm = document.getElementById('tm-'+m);
    if (tm) tm.classList.add('active');
  };

  window.openLightbox = (i) => {
    const p = window._galleryPhotos[i];
    lightboxEntryId = p.entryId;
    document.getElementById('lightbox-img').src = p.url;
    document.getElementById('lightbox-title').textContent = p.title;
    document.getElementById('lightbox-meta').textContent = `${p.date}${p.mood?' · '+p.mood:''}`;
    document.getElementById('lightbox').classList.add('open');
  };
  window.closeLightbox = () => {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  };
  window.gotoEntry = () => {
    closeLightbox();
    const entry = allEntries.find(e => e.id === lightboxEntryId);
    if (entry) { switchPage('journal'); document.getElementById('search-input').value = entry.date; filterEntries(); }
  };
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // OVERVIEW
  function renderOverview() {
    const locs = new Set(allEntries.map(e=>e.location).filter(Boolean));
    document.getElementById('stat-total').textContent = allEntries.length;
    document.getElementById('stat-locs').textContent = locs.size;
    const dates = [...new Set(allEntries.map(e=>e.date).filter(Boolean))].sort().reverse();
    let streak = 0;
    if (dates.length) {
      let check = new Date(dates[0]);
      for (const d of dates) {
        const dd = new Date(d);
        if (Math.round((check-dd)/86400000) <= 1) { streak++; check = dd; } else break;
      }
    }
    document.getElementById('stat-streak').textContent = streak;
    renderCalendar(); renderMoodChart(); renderTagCloud(); renderLocList();
  }

  function renderCalendar() {
    const entryDates = new Set(allEntries.map(e=>e.date).filter(Boolean));
    const today = new Date().toISOString().slice(0,10);
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('cal-label').textContent = `${calYear} 年 ${months[calMonth]}`;
    const first = new Date(calYear, calMonth, 1).getDay();
    const days = new Date(calYear, calMonth+1, 0).getDate();
    const prevDays = new Date(calYear, calMonth, 0).getDate();
    let html = '';
    for (let i=first-1; i>=0; i--) html += `<div class="cal-day other-month">${prevDays-i}</div>`;
    for (let d=1; d<=days; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const has = entryDates.has(ds), isT = ds===today;
      html += `<div class="cal-day ${has?'has-entry':''} ${isT?'today':''}" ${has?`onclick="jumpToDate('${ds}')" title="查看日記"`:''}>${d}</div>`;
    }
    const rem = (first+days)%7; if(rem) for(let d=1;d<=7-rem;d++) html+=`<div class="cal-day other-month">${d}</div>`;
    document.getElementById('cal-days').innerHTML = html;
  }

  window.calPrev = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  window.calNext = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
  window.jumpToDate = (date) => { switchPage('journal'); document.getElementById('search-input').value=date; filterEntries(); };

  function renderMoodChart() {
    const moods = ['😊','🥰','🤩','😌','😴','😢','😰','😡'];
    const counts = {};
    allEntries.forEach(e => { if(e.mood) counts[e.mood]=(counts[e.mood]||0)+1; });
    const used = moods.filter(m=>counts[m]);
    if (!used.length) { document.getElementById('mood-chart').innerHTML='<span class="no-data">還沒有心情記錄</span>'; return; }
    const max = Math.max(...used.map(m=>counts[m]));
    document.getElementById('mood-chart').innerHTML = used.map(m=>`
      <div class="mood-bar-wrap">
        <div style="flex:1;display:flex;align-items:flex-end;width:100%">
          <div class="mood-bar" style="height:${Math.max(6,(counts[m]/max)*60)}px;opacity:${0.5+(counts[m]/max)*0.5}"></div>
        </div>
        <div class="mood-bar-emoji">${m}</div>
        <div class="mood-bar-count">${counts[m]}</div>
      </div>`).join('');
  }

  function renderTagCloud() {
    const counts = {};
    allEntries.forEach(e=>(e.tags||[]).forEach(t=>{counts[t]=(counts[t]||0)+1;}));
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,30);
    if (!sorted.length) { document.getElementById('tag-cloud').innerHTML='<span class="no-data">還沒有標籤</span>'; return; }
    const max = sorted[0][1];
    document.getElementById('tag-cloud').innerHTML = sorted.map(([tag,cnt])=>{
      const size = 11+Math.round((cnt/max)*8);
      return `<span class="cloud-tag" style="font-size:${size}px" onclick="filterByTag('${tag}')"># ${tag} <span style="opacity:0.5">${cnt}</span></span>`;
    }).join('');
  }

  function renderLocList() {
    const counts = {};
    allEntries.forEach(e=>{if(e.location) counts[e.location]=(counts[e.location]||0)+1;});
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if (!sorted.length) { document.getElementById('loc-list').innerHTML='<span class="no-data">還沒有地點記錄</span>'; return; }
    document.getElementById('loc-list').innerHTML = sorted.map(([loc,cnt])=>`
      <div class="loc-item" onclick="filterByTag('${loc}')">
        <span>📍 ${loc}</span>
        <span class="loc-count">${cnt} 篇</span>
      </div>`).join('');
  }

  window.filterByTag = (tag) => { switchPage('journal'); document.getElementById('search-input').value=tag; filterEntries(); };

  // MODAL
  window.openModal = () => {
    document.getElementById('modal').classList.add('open');
    document.getElementById('entry-date').value = new Date().toISOString().slice(0,10);
    currentTags=[]; selectedMood=''; selectedFiles=[];
    ['tags-preview','photo-preview'].forEach(id=>document.getElementById(id).innerHTML='');
    ['entry-title','entry-content','entry-location'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('entry-private').checked=false;
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById('upload-area').querySelector('.photo-upload-text').textContent = '點擊或拖曳照片到這裡';
  };
  window.closeModal = () => document.getElementById('modal').classList.remove('open');

  window.selectMood = (btn) => {
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); selectedMood=btn.dataset.mood;
  };

  window.addTag = () => {
    const input=document.getElementById('tag-input'), val=input.value.trim();
    if(!val||currentTags.includes(val)){input.value='';return;}
    currentTags.push(val); input.value='';
    document.getElementById('tags-preview').innerHTML=currentTags.map((t,i)=>
      `<span class="tag-chip" onclick="removeTag(${i})"># ${t} ×</span>`).join('');
  };
  window.removeTag = (i) => {
    currentTags.splice(i,1);
    document.getElementById('tags-preview').innerHTML=currentTags.map((t,j)=>
      `<span class="tag-chip" onclick="removeTag(${j})"># ${t} ×</span>`).join('');
  };

  window.previewPhotos = () => {
    const files = Array.from(document.getElementById('photo-input').files);
    selectedFiles = files;
    const prev = document.getElementById('photo-preview');
    prev.innerHTML = '';
    files.forEach((f,i) => {
      const wrap = document.createElement('div');
      wrap.className = 'photo-preview-item';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      const rm = document.createElement('button');
      rm.className = 'photo-preview-remove';
      rm.textContent = '×';
      rm.onclick = () => { selectedFiles.splice(i,1); wrap.remove(); };
      wrap.appendChild(img); wrap.appendChild(rm);
      prev.appendChild(wrap);
    });
    const txt = document.getElementById('upload-area').querySelector('.photo-upload-text');
    txt.textContent = files.length > 0 ? `已選擇 ${files.length} 張照片` : '點擊或拖曳照片到這裡';
  };

  // SAVE
  window.saveEntry = async () => {
    const btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='儲存中…';
    try {
      const photoURLs=[];
      for(const file of selectedFiles){
        btn.textContent=`上傳照片 ${photoURLs.length+1}/${selectedFiles.length}…`;
        const fd=new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'journal_upload');
        fd.append('folder', `journal/${currentUser.uid}`);
        const res=await fetch('https://api.cloudinary.com/v1_1/myjournalweb/image/upload',{method:'POST',body:fd});
        const data=await res.json();
        if(data.secure_url) photoURLs.push(data.secure_url);
        else throw new Error(data.error?.message||'照片上傳失敗');
      }
      btn.textContent='儲存中…';
      await addDoc(collection(db,'entries'),{
        uid:currentUser.uid,
        title:document.getElementById('entry-title').value.trim(),
        content:document.getElementById('entry-content').value.trim(),
        date:document.getElementById('entry-date').value,
        mood:selectedMood,
        location:document.getElementById('entry-location').value.trim(),
        tags:currentTags, photos:photoURLs,
        isPrivate:document.getElementById('entry-private').checked,
        createdAt:serverTimestamp(),
      });
      closeModal(); showToast('✦ 日記已儲存'); await loadEntries();
    } catch(e){ showToast('儲存失敗：'+e.message); }
    btn.disabled=false; btn.textContent='儲存日記';
  };

  // DELETE
  window.deleteEntry = async (e,id) => {
    e.stopPropagation();
    if(!confirm('確定要刪除這篇日記嗎？')) return;
    await deleteDoc(doc(db,'entries',id)); showToast('已刪除'); await loadEntries();
  };

  // TOAST
  window.showToast = (msg) => {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  };
</script>
</body>
</html>
